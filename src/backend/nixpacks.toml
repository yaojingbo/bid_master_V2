# Railway Nixpacks 备用构建配置。
# 推荐使用仓库根目录 Dockerfile 部署后端，以完整安装 OCRmyPDF/Tesseract 中文语言包。

[phases.setup]
aptPkgs = [
  "libgomp1",
  "libgl1",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender1",
  "ghostscript",
  "qpdf",
  "poppler-utils",
  "tesseract-ocr",
  "tesseract-ocr-chi-sim",
  "tesseract-ocr-eng"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "pip install ocrmypdf"
]

[start]
cmd = "bash -c 'export PADDLEOCR_HOME=${PADDLEOCR_HOME:-/data/paddleocr} OCR_SAVE_EVIDENCE=${OCR_SAVE_EVIDENCE:-false} OCR_EVIDENCE_DIR=${OCR_EVIDENCE_DIR:-/data/ocr-evidence} && mkdir -p $PADDLEOCR_HOME $OCR_EVIDENCE_DIR && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
